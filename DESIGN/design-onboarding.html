<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding Design — 字幕套件</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 32px;
      gap: 32px;
    }

    /* ── Page header ── */
    .page-title {
      font-size: 13px;
      font-weight: 500;
      color: #52525b;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Stage label ── */
    .stage-label {
      font-size: 11px;
      color: #52525b;
      letter-spacing: 0.06em;
      text-align: center;
      margin-bottom: 8px;
    }

    /* ── Layout: two sidebars side by side ── */
    .demo-row {
      display: flex;
      gap: 48px;
      align-items: flex-start;
    }

    .demo-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* ── Sidebar shell ── */
    .sidebar {
      width: 360px;
      min-height: 600px;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Top bar (step indicator) ── */
    .top-bar {
      padding: 18px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .step-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .step-label {
      font-size: 11px;
      font-weight: 500;
      color: #71717a;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .step-dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 20px;
      height: 4px;
      border-radius: 999px;
      background: #27272a;
      transition: background 0.25s;
    }

    .dot.active {
      background: #7c3aed;
    }

    .dot.done {
      background: #4c1d95;
    }

    /* Progress bar */
    .progress-track {
      height: 2px;
      background: #18181b;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #5b21b6, #7c3aed);
      border-radius: 999px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Content area ── */
    .content {
      padding: 24px 20px 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 6px;
    }

    .step-title {
      font-size: 20px;
      font-weight: 700;
      color: #fafafa;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .step-subtitle {
      font-size: 13px;
      color: #71717a;
      line-height: 1.6;
      margin-top: 4px;
      margin-bottom: 12px;
    }

    /* ── Language list ── */
    .lang-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .lang-btn {
      width: 100%;
      padding: 11px 14px;
      background: #18181b;
      border: 1.5px solid #27272a;
      border-radius: 8px;
      color: #d4d4d8;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      outline: none;
      position: relative;
    }

    .lang-btn:hover:not(.selected) {
      background: #1f1f23;
      border-color: #3f3f46;
      color: #fafafa;
    }

    .lang-btn.selected {
      background: rgba(124, 58, 237, 0.12);
      border-color: #7c3aed;
      color: #fafafa;
    }

    .lang-btn .check-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid #3f3f46;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .lang-btn.selected .check-icon {
      background: #7c3aed;
      border-color: #7c3aed;
    }

    /* SVG checkmark inside circle */
    .check-icon svg {
      opacity: 0;
      transition: opacity 0.15s;
    }

    .lang-btn.selected .check-icon svg {
      opacity: 1;
    }

    .lang-name {
      flex: 1;
    }

    .lang-native {
      font-size: 12px;
      color: #52525b;
      font-weight: 400;
    }

    .lang-btn.selected .lang-native {
      color: #a78bfa;
    }

    /* ── Footer buttons ── */
    .footer {
      padding: 16px 20px 20px;
      border-top: 1px solid #18181b;
      display: flex;
      gap: 8px;
    }

    .btn-primary {
      flex: 1;
      padding: 11px 20px;
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      color: #fafafa;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s, transform 0.1s;
      outline: none;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover {
      background: #6d28d9;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      background: #3f3f46;
      color: #52525b;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      padding: 11px 16px;
      background: transparent;
      border: 1.5px solid #27272a;
      border-radius: 8px;
      color: #71717a;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, color 0.15s;
      outline: none;
    }

    .btn-secondary:hover {
      border-color: #52525b;
      color: #a1a1aa;
    }

    /* ── Selection hint ── */
    .select-hint {
      font-size: 11px;
      color: #3f3f46;
      text-align: center;
      padding-top: 4px;
      transition: color 0.2s;
    }

    .select-hint.has-selection {
      color: #52525b;
    }

    /* ── Completion state ── */
    .completion-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      color: #a78bfa;
      font-weight: 500;
      margin-top: 6px;
    }

  </style>
</head>
<body>

  <p class="page-title">Onboarding Design Spec — 語言選擇流程</p>

  <div class="demo-row">

    <!-- ═══════════════ STEP 1 ═══════════════ -->
    <div class="demo-col">
      <p class="stage-label">Step 1 — 學習語言</p>

      <div class="sidebar" id="step1">

        <!-- Top bar -->
        <div class="top-bar">
          <div class="step-meta">
            <span class="step-label">步驟 1 / 2</span>
            <div class="step-dots">
              <div class="dot active"></div>
              <div class="dot"></div>
            </div>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width: 50%"></div>
          </div>
        </div>

        <!-- Content -->
        <div class="content">
          <h2 class="step-title">你在學哪個語言？</h2>
          <p class="step-subtitle">字幕會優先顯示這個語言，<br>找不到時自動翻譯</p>

          <div class="lang-list" id="step1-list">
            <!-- 語言項目由 JS 產生 -->
          </div>

          <p class="select-hint" id="step1-hint">請選擇一個語言</p>
        </div>

        <!-- Footer -->
        <div class="footer">
          <button class="btn-primary" id="step1-next" disabled>
            下一步
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 7h8M8 4l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

      </div>
    </div>

    <!-- ═══════════════ STEP 2 ═══════════════ -->
    <div class="demo-col">
      <p class="stage-label">Step 2 — 母語</p>

      <div class="sidebar" id="step2">

        <!-- Top bar -->
        <div class="top-bar">
          <div class="step-meta">
            <span class="step-label">步驟 2 / 2</span>
            <div class="step-dots">
              <div class="dot done"></div>
              <div class="dot active"></div>
            </div>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width: 100%"></div>
          </div>
        </div>

        <!-- Content -->
        <div class="content">
          <h2 class="step-title">你的母語是？</h2>
          <p class="step-subtitle">作為對照的副字幕語言</p>

          <div class="lang-list" id="step2-list">
            <!-- 語言項目由 JS 產生，排除 Step1 選中的 -->
          </div>

          <p class="select-hint" id="step2-hint">請選擇一個語言</p>
        </div>

        <!-- Footer -->
        <div class="footer">
          <button class="btn-secondary" id="step2-back">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M11 7H3M6 10L3 7l3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            上一步
          </button>
          <button class="btn-primary" id="step2-finish" disabled>
            完成設定
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2.5 7.5L5.5 10.5L11.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

      </div>
    </div>

  </div>

  <!-- ── 示意說明 ── -->
  <div style="max-width: 780px; text-align: center; color: #3f3f46; font-size: 12px; line-height: 1.7; margin-top: 8px;">
    兩個 sidebar 各自獨立可互動 — 點擊語言按鈕切換選中狀態，Step 1 選擇後「下一步」啟用；Step 2 會自動排除 Step 1 已選語言。
  </div>

  <script>
    // ── 語言資料 ──
    const LANGUAGES = [
      { code: 'en',    name: '英文',    native: 'English'    },
      { code: 'ja',    name: '日文',    native: '日本語'      },
      { code: 'ko',    name: '韓文',    native: '한국어'      },
      { code: 'es',    name: '西班牙文', native: 'Español'    },
      { code: 'fr',    name: '法文',    native: 'Français'   },
      { code: 'de',    name: '德文',    native: 'Deutsch'    },
      { code: 'zh-TW', name: '繁體中文', native: '繁體中文'    },
      { code: 'zh-CN', name: '簡體中文', native: '简体中文'    },
    ];

    // ── 狀態 ──
    let step1Selection = null; // 學習語言 code
    let step2Selection = null; // 母語 code

    // ── 產生勾選圓圈 SVG ──
    function checkIconHTML() {
      return `<span class="check-icon">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M2 5.5L4 7.5L8 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>`;
    }

    // ── 渲染 Step 1 語言列表 ──
    function renderStep1() {
      const list = document.getElementById('step1-list');
      list.innerHTML = '';
      LANGUAGES.forEach(lang => {
        const btn = document.createElement('button');
        btn.className = 'lang-btn' + (step1Selection === lang.code ? ' selected' : '');
        btn.dataset.code = lang.code;
        btn.innerHTML = `
          ${checkIconHTML()}
          <span class="lang-name">${lang.name}</span>
          <span class="lang-native">${lang.native}</span>
        `;
        btn.addEventListener('click', () => {
          step1Selection = lang.code;
          // Step2 若選了同一語言則清除
          if (step2Selection === lang.code) step2Selection = null;
          renderStep1();
          renderStep2();
        });
        list.appendChild(btn);
      });

      // 按鈕與提示更新
      const hint = document.getElementById('step1-hint');
      const nextBtn = document.getElementById('step1-next');
      if (step1Selection) {
        const sel = LANGUAGES.find(l => l.code === step1Selection);
        hint.textContent = `已選：${sel.name} (${sel.native})`;
        hint.classList.add('has-selection');
        nextBtn.disabled = false;
      } else {
        hint.textContent = '請選擇一個語言';
        hint.classList.remove('has-selection');
        nextBtn.disabled = true;
      }
    }

    // ── 渲染 Step 2 語言列表（排除 step1Selection）──
    function renderStep2() {
      const list = document.getElementById('step2-list');
      list.innerHTML = '';
      const available = LANGUAGES.filter(l => l.code !== step1Selection);
      available.forEach(lang => {
        const btn = document.createElement('button');
        btn.className = 'lang-btn' + (step2Selection === lang.code ? ' selected' : '');
        btn.dataset.code = lang.code;
        btn.innerHTML = `
          ${checkIconHTML()}
          <span class="lang-name">${lang.name}</span>
          <span class="lang-native">${lang.native}</span>
        `;
        btn.addEventListener('click', () => {
          step2Selection = lang.code;
          renderStep2();
        });
        list.appendChild(btn);
      });

      // 按鈕與提示更新
      const hint = document.getElementById('step2-hint');
      const finishBtn = document.getElementById('step2-finish');
      if (step2Selection) {
        const sel = LANGUAGES.find(l => l.code === step2Selection);
        hint.textContent = `已選：${sel.name} (${sel.native})`;
        hint.classList.add('has-selection');
        finishBtn.disabled = false;
      } else {
        hint.textContent = '請選擇一個語言';
        hint.classList.remove('has-selection');
        finishBtn.disabled = true;
      }
    }

    // ── 「完成設定」顯示結果 ──
    document.getElementById('step2-finish').addEventListener('click', () => {
      if (!step1Selection || !step2Selection) return;
      const learn = LANGUAGES.find(l => l.code === step1Selection);
      const native = LANGUAGES.find(l => l.code === step2Selection);
      const msg = `設定完成！\n學習語言：${learn.name}\n母語：${native.name}`;
      // 簡單 toast 替代 alert
      showToast(msg);
    });

    // ── 上一步按鈕（Step 2 示意用，不做頁面切換）──
    document.getElementById('step2-back').addEventListener('click', () => {
      showToast('↩ 上一步（在真實 sidebar 中會切換回 Step 1）');
    });

    // ── 簡單 Toast ──
    function showToast(msg) {
      const existing = document.getElementById('toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.id = 'toast';
      toast.style.cssText = `
        position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
        background: #18181b; border: 1px solid #3f3f46; border-radius: 8px;
        padding: 12px 20px; color: #fafafa; font-size: 13px; white-space: pre;
        line-height: 1.6; z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        animation: fadeIn 0.2s ease;
      `;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ── 初始化 ──
    renderStep1();
    renderStep2();
  </script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0);   }
    }
  </style>

</body>
</html>
