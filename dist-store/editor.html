<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字幕編輯器 — 學習Bar</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body class="ed-studio">

  <!-- ===== 全螢幕影片區（左側背景）===== -->
  <div id="ed-video-stage">
    <iframe
      id="ed-yt-iframe"
      allow="autoplay; encrypted-media"
      allowfullscreen
      title="YouTube 影片"
    ></iframe>
    <!-- 無影片時的佔位背景 -->
    <div id="ed-video-placeholder">
      <div class="ed-placeholder-logo">
        <span class="ed-logo-zh">學習</span><span class="ed-logo-bar">Bar</span>
      </div>
      <p>載入字幕後影片將自動嵌入</p>
    </div>
  </div>

  <!-- ===== 右側玻璃面板（覆蓋影片上）===== -->
  <aside id="ed-panel">

    <!-- Panel Header -->
    <header id="ed-panel-header">
      <div class="ed-logo">
        <span class="ed-logo-zh">學習</span><span class="ed-logo-bar">Bar</span>
      </div>
      <span id="ed-video-title" title="">字幕編輯器</span>
      <div class="ed-yt-status" title="YouTube 分頁連線狀態">
        <span class="ed-yt-dot" id="ed-yt-dot"></span>
        <span id="ed-yt-label">未連線</span>
      </div>
    </header>

    <!-- Meta Row -->
    <div id="ed-meta">
      <input id="ed-author" class="ed-meta-input" type="text" placeholder="作者暱稱" maxlength="40">
      <input id="ed-subname" class="ed-meta-input" type="text" placeholder="字幕名稱" maxlength="80">
      <span class="ed-meta-badge" id="ed-line-count">0 句</span>
    </div>

    <!-- Toolbar -->
    <div id="ed-toolbar">
      <input id="ed-search" type="search" placeholder="搜尋字幕..." autocomplete="off">
      <button id="ed-sync-btn" class="ed-toggle-btn" title="同步播放：focus 時自動跳轉影片">▶ 同步</button>
      <button id="ed-loop-btn" class="ed-toggle-btn" title="循環此句：持續重播目前選取的句子">⇄ 循環</button>
      <span id="ed-focus-indicator">未選取</span>
    </div>

    <!-- 句子卡片清單（可上下滾動）-->
    <div id="ed-sentence-list">
      <!-- 由 editor.js 動態渲染 -->
    </div>

    <!-- 無資料狀態 -->
    <div id="ed-no-data" style="display:none">
      <div class="ed-no-data-icon">📋</div>
      <p>沒有字幕資料。<br>請先在 YouTube 頁面載入字幕，<br>再點擊「✏ 自定義字幕」按鈕。</p>
    </div>

    <!-- 循環狀態列 -->
    <div id="ed-loop-status">
      <span class="ed-loop-indicator"></span>
      <span id="ed-loop-text">循環中...</span>
    </div>

    <!-- Footer -->
    <footer id="ed-panel-footer">
      <button id="ed-save-local-btn" class="ed-footer-btn" title="儲存到本地">💾 儲存</button>
      <button id="ed-export-btn" class="ed-footer-btn" title="匯出 .srt">匯出</button>
      <button id="ed-share-btn" class="ed-footer-btn primary" title="分享至社群">分享至社群</button>
    </footer>

  </aside>

  <script type="module" src="editor.js"></script>
</body>
</html>
